databases:
  - name: event-postgres
    databaseName: event_platform
    user: event_platform_user

services:
  - type: web
    name: event-backend
    env: node
    rootDir: backend
    buildCommand: npm install
    startCommand: npm run start
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: SESSION_SECRET
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: event-postgres
          property: connectionString
      - key: FRONTEND_URL
        value: https://event-frontend-w18p.onrender.com
      - key: ADMIN_EMAIL
        value: admin@asquareevents.com
      - key: ADMIN_PASSWORD
        sync: false
      - key: ADMIN_FULL_NAME
        value: ASquare Events Admin
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: GOOGLE_CALLBACK_URL
        value: https://event-backend-pbx8.onrender.com/auth/google/callback
      - key: EMAIL_USER
        sync: false
      - key: EMAIL_PASSWORD
        sync: false
      - key: ADMIN_WHATSAPP_NUMBER
        sync: false
      - key: WHATSAPP_CLOUD_ACCESS_TOKEN
        sync: false
      - key: WHATSAPP_CLOUD_PHONE_NUMBER_ID
        sync: false
      - key: WHATSAPP_CLOUD_API_VERSION
        value: v22.0
      - key: WHATSAPP_SEND_CUSTOMER_ACK
        value: true

  - type: web
    name: event-frontend
    env: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    autoDeploy: true
    envVars:
      - key: VITE_API_BASE_URL
        value: https://event-backend-pbx8.onrender.com
